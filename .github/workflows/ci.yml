name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SOROBAN_NETWORK: testnet
  CARGO_INCREMENTAL: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            escrow/target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('escrow/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-
      - name: Check formatting
        run: cargo fmt --all -- --check
        working-directory: escrow
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings
        working-directory: escrow

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            escrow/target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('escrow/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
      - name: Run tests
        run: cargo test --all
        working-directory: escrow
      - name: Run tests with testutils feature
        run: cargo test --all --features testutils
        working-directory: escrow

  build:
    name: Build Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            escrow/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('escrow/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev libusb-1.0-0-dev
      - name: Install soroban-cli
        run: cargo install --locked soroban-cli
      - name: Build contract
        run: cargo build --release
        working-directory: escrow
      - name: Check contract size
        run: |
          SIZE=$(stat -f%z escrow/target/release/libstellflow_escrow.so 2>/dev/null || stat -c%s escrow/target/release/libstellflow_escrow.so 2>/dev/null)
          echo "Contract size: $SIZE bytes"
          MAX_SIZE=1000000
          if [ "$SIZE" -gt "$MAX_SIZE" ]; then
            echo "ERROR: Contract exceeds maximum size of $MAX_SIZE bytes"
            exit 1
          fi
      - name: Optimize contract
        run: |
          soroban contract optimize \
            --wasm escrow/target/release/libstellflow_escrow.so \
            > escrow/target/release/stellflow_escrow_optimized.wasm
          OPT_SIZE=$(stat -f%z escrow/target/release/stellflow_escrow_optimized.wasm 2>/dev/null || stat -c%s escrow/target/release/stellflow_escrow_optimized.wasm 2>/dev/null)
          echo "Optimized contract size: $OPT_SIZE bytes"
      - name: Upload contract artifact
        uses: actions/upload-artifact@v4
        with:
          name: escrow-contract
          path: |
            escrow/target/release/libstellflow_escrow.so
            escrow/target/release/stellflow_escrow_optimized.wasm

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run security audit
        run: cargo audit
        working-directory: escrow
